# Lexibrary project configuration
# This file is created by `lexictl init` and lives at .lexibrary/config.yaml
# Values here override the global config at ~/.config/lexibrary/config.yaml

# Scope roots: each declared root is an independent subtree under which files
# get design files. List of mappings — always a list, even for a single root.
# Add entries (e.g. - path: baml_src/) to index multiple sibling source trees.
scope_roots:
  - path: .

# Project name (set during lexictl init)
project_name: ""

# Lexibrary version stamp — auto-managed; do NOT set by hand.
# Stamped by `lexictl upgrade`. Empty string means the project predates the stamp.
lexibrary_version: ""

# Agent environments configured during init (e.g., claude, cursor)
agent_environment: []

# User-declared conventions (each entry is materialized to .lexibrary/conventions/
# with source: config, status: active). Shape: { body, scope: project, tags: [] }.
convention_declarations: []

# I Was Here (IWH) configuration
iwh:
  enabled: true                          # Enable IWH agent trace files

# LLM provider settings
llm:
  provider: anthropic                    # LLM provider: anthropic, openai, ollama
  model: claude-sonnet-4-6              # Model identifier
  api_key_env: ANTHROPIC_API_KEY         # Env var holding the API key
  api_key_source: env                    # How the API key is provided: env, dotenv, or manual
  max_retries: 3                         # Retry attempts on API failure
  timeout: 60                            # Request timeout in seconds

# Per-artifact token budgets (validation targets for generated content)
token_budgets:
  design_file_tokens: 400                # Full design file budget
  design_file_abridged_tokens: 100       # Abridged design file budget
  aindex_tokens: 200                     # .aindex routing table budget
  concept_file_tokens: 400               # Concept file budget
  convention_file_tokens: 500            # Convention file budget
  lookup_total_tokens: 1200              # Total budget for lexi lookup output
  playbook_tokens: 500                   # Playbook display budget
  summarize_max_tokens: 200              # Max tokens for LLM summarize responses
  archivist_max_tokens: 5000             # Max tokens for LLM archivist responses

# Mapping strategies (glob patterns → generation strategy)
# Populated in Phase 4; empty list uses default 1:1 mapping
mapping:
  strategies: []

# Ignore patterns for file discovery
ignore:
  use_gitignore: true                    # Respect .gitignore files
  additional_patterns:
    - ".lexibrary/"
    - node_modules/
    - __pycache__/
    - .git/
    - .venv/
    - venv/
    - "*.lock"
    - .env
    - ".env.*"
    - "*.env"

# Sweep settings (periodic re-indexing)
sweep:
  sweep_interval_seconds: 3600           # Full re-index safety net (seconds)
  sweep_skip_if_unchanged: true          # Skip sweep if no files changed since last run
  log_level: info                        # Sweep log level (debug, info, warning, error)

# Crawl behaviour
crawl:
  max_file_size_kb: 512               # Files larger than this (KB) are skipped during update
  binary_extensions:  # Extensions treated as binary
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .ico
    - .svg
    - .webp
    - .mp3
    - .mp4
    - .wav
    - .ogg
    - .webm
    - .woff
    - .woff2
    - .ttf
    - .eot
    - .zip
    - .tar
    - .gz
    - .bz2
    - .7z
    - .rar
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx
    - .exe
    - .dll
    - .so
    - .dylib
    - .pyc
    - .pyo
    - .class
    - .o
    - .obj
    - .sqlite
    - .db

# Concept system settings
concepts:
  deprecation_confirm: human               # Who confirms concept deprecation: human or maintainer

# Convention system settings
conventions:
  lookup_display_limit: 5                # Max conventions shown in lexi lookup output
  deprecation_confirm: human             # Who confirms convention deprecation: human | maintainer
  curator_deprecation_confirm: false     # Allow curator to auto-confirm convention deprecation

# Deprecation lifecycle settings
deprecation:
  ttl_commits: 50                        # Commits before deprecated files are deleted
  comment_warning_threshold: 10           # Comment count that triggers a maintenance warning

# Validator fixer kill-switches
validator:
  fix_lookup_token_budget_condense: false  # Opt-in: condense over-budget design bodies (mutates content + LLM cost)
  fix_orphaned_iwh_signals_delete: true    # Delete expired IWH signals past their TTL (signals are ephemeral)

# Stack post staleness lifecycle
stack:
  staleness_confirm: human               # Who confirms staleness: human or maintainer
  staleness_ttl_commits: 200             # Commits before resolved posts are flagged stale
  staleness_ttl_short_commits: 100       # Shorter TTL for wontfix/by_design/cannot_reproduce
  lookup_display_limit: 3                # Max posts shown in lexi lookup "Known Issues"

# Playbook system settings
playbooks:
  lookup_display_limit: 5                # Max triggered playbooks shown in lookup
  staleness_commits: 100                 # Commits since last_verified before flagging stale
  staleness_days: 180                    # Calendar day fallback for staleness

# Topology generation (TOPOLOGY.md output)
topology:
  detail_dirs: []                        # Dirs to expand with full file lists in TOPOLOGY.md (empty = none)

# Curator subsystem settings
curator:
  autonomy: auto_low                     # Autonomy level: auto_low | full | propose
  max_llm_calls_per_run: 50              # Max LLM calls per curator run
  risk_overrides: {}                     # Per-action risk-tier overrides (action_key: low | medium | high)
  consistency_collect: scope             # Consistency-check scope: off | scope | full
  verify_after_sweep: false              # Re-run validate_library() after dispatch and record before/after delta
  prepare_indexes: true                  # Phase 0: refresh symbol/link graphs before collect (opt-out for large libraries)
  reactive_bootstrap_regenerate: false   # When true, reactive post-edit hook invokes archivist LLM regen (counts against max_llm_calls_per_run)
  two_pass_collect: true                 # Phase 2: two-pass hash/graph collect with 70/30 budget split (kill-switch)
  deprecation:
    ttl_commits: 50                      # Commits before curator-deprecated artifacts hard-delete
  budget:
    token_limits:
      design_file: 4000                  # Token budget for design files (Budget Trimmer sub-agent)
      start_here: 3000                   # Token budget for START-HERE files
      handoff: 2000                      # Token budget for HANDOFF files
  auditing:
    quality_threshold: 0.7               # Comment quality threshold (0.0–1.0); below this triggers audit
  reactive:
    enabled: false                       # Master switch for reactive hooks
    post_edit: true                      # Run reactive curator on post-edit hook
    post_bead_close: true                # Run reactive curator on post-bead-close hook
    validation_failure: true             # Run reactive curator on validation failure
    severity_threshold: error            # Min severity to trigger reactive curator: error | warning | critical

# AST-based interface extraction
ast:
  enabled: true                          # Enable interface skeleton extraction
  languages:                             # Languages to extract interfaces from
    - python
    - typescript
    - javascript

# Symbol-level code graph (.lexibrary/symbols.db)
# Extracted by the AST parser during `lexictl update`.
symbols:
  enabled: true                          # Build and refresh .lexibrary/symbols.db during lexictl update
  include_enums: true                    # Feed enums/constants into the design-file prompt for richer prose
  include_call_paths: false              # Opt-in: feed call-path summaries into the prompt (increases tokens)
  call_path_depth: 2                     # Hops per direction when include_call_paths is on
  max_enum_items: 20                     # Cap enum/constant entries per file (truncates with "... N more")
  max_call_path_items: 10                # Cap call-path entries per file (truncates with "... N more")
  include_data_flows: false              # opt-in (Phase 7) — gated on deterministic AST signal
