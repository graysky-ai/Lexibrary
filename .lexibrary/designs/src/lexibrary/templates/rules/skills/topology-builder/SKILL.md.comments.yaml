comments:
- body: 'Added multi-scope-root guidance: documented outer <!-- root: PATH --> wrappers
    that repeat per-root sections (header, entry-point-candidates, tree, source-modules,
    test-layout) around project-wide config/stats; generalised entry-point verification
    beyond pyproject.toml to cover package.json, Cargo.toml, go.mod, Makefile, Dockerfile;
    added a Scope-Roots-and-Whole-Project-View section and a writing rule clarifying
    that scope roots filter which files get designs and are searchable, not what appears
    in the topology. The topology must always show the whole repo with one unified
    tree, one Entry Points table, and one Scope Roots table listing configured roots.'
