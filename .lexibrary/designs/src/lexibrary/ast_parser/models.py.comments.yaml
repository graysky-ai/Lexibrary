comments:
- body: 'Group 3 of symbol-graph-2: added CallSite, SymbolDefinition, and SymbolExtract
    models. SymbolDefinition validates symbol_type (function/method/class) and visibility
    (public/private). See specs/symbol-extractor for field semantics.'
  date: '2026-04-10T19:44:33.766379Z'
- body: 'Added ClassEdgeSite Pydantic model (symbol-graph-3 phase 3, group 2). The
    model represents a class-level edge (inherits or instantiates) emitted from the
    parse tree of a source file. Fields: source_name (qualified name of the owning
    class/function), target_name (raw textual name of the base/instantiated class
    before resolution), edge_type (''inherits'' | ''instantiates''), and line (source
    line). The edge is the AST-level ancestor of a row in the class_edges or class_edges_unresolved
    table of .lexibrary/symbols.db; pass 3 of the symbol-graph builder resolves target_name
    to a symbols.id and persists the result. Also extended SymbolExtract with a class_edges:
    list[ClassEdgeSite] field (defaults to []) so call and class-edge extraction can
    share a single parse tree. Downstream groups 3 and 4 will populate and resolve
    these edges.'
  date: '2026-04-11T10:23:49.260781Z'
- body: "Added EnumMemberSig and ConstantValue Pydantic models for Phase 4 symbol-graph\
    \ enum/constant extraction. Extended SymbolExtract with two new fields: enums\
    \ (list of (qualified_name, list[EnumMemberSig])) and constants (list[ConstantValue]).\
    \ Parsers (Python, TypeScript, JavaScript) will populate these in later groups;\
    \ the symbolgraph builder consumes them to insert rows into the symbol_members\
    \ table. EnumMemberSig.value and ConstantValue.value are None when the RHS is\
    \ not a simple literal (e.g. auto() calls or complex expressions) \u2014 rows\
    \ with None values are skipped during symbol_members insertion."
  date: '2026-04-11T19:35:35.770535Z'
- body: 'symbol-graph-4 Group 3: extended _ALLOWED_SYMBOL_TYPES to include ''enum''
    and ''constant'' so the three parser beads (Python/TS/JS) can emit SymbolDefinition
    entries with these symbol_types without tripping the Pydantic validator. This
    is a cross-cutting prerequisite shared by Groups 2, 3, and 4; Group 1 added the
    EnumMemberSig and ConstantValue models but did not update the allow-list.'
  date: '2026-04-11T19:46:43.876006Z'
- body: Added CompositionSite model and compositions field on SymbolExtract for Phase
    6 composition edge tracking. CompositionSite captures has-a relationships from
    annotated class attributes. The compositions list participates alongside class_edges
    in the symbol graph builder's class-edge passes.
  date: '2026-04-12T03:18:58.456475Z'
