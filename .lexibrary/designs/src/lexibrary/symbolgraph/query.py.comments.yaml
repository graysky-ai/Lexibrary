comments:
- body: Implemented class_edges_from, class_edges_to, and members_of with real SQL
    queries as part of symbol-graph-3 group 1 (Phase 2 completion). Added _SELECT_CLASS_EDGE
    and _SELECT_SYMBOL_MEMBER shared SQL fragments plus _row_to_class_edge and _row_to_member
    adapters following the existing symbols-join pattern. The class_edges queries
    order by edge_type then file path then line so inheritance edges render before
    instantiation edges; members_of orders by ordinal (NULLs last) then name for deterministic
    output. Returns empty list when tables are empty; real data arrives once groups
    3-4 populate class_edges and when Phase 4 populates symbol_members.
  date: '2026-04-11T10:27:26.413053Z'
- body: "symbol-graph-3 group 5: add UnresolvedClassEdgeRow NamedTuple and SymbolGraph.class_edges_unresolved_from()\
    \ \u2014 reads class_edges_unresolved for Phase 3 trace output. Ordered by edge_type,\
    \ target_name, line for deterministic rendering."
  date: '2026-04-11T11:15:08.977861Z'
- body: 'symbol-graph-4 group 6.1 adds symbols_with_member_value_like: the value-search
    leg of lexi search --type symbol. Joins symbol_members to _SELECT_SYMBOL and filters
    sm.value LIKE ? so a user searching for a bug literal (e.g. "pending") finds the
    canonical enum whose variant has that value. GROUP BY s.id de-dupes parents with
    multiple matching members; ORDER BY s.name keeps the result deterministic. The
    needle is wrapped in % wildcards, matching every other LIKE query on this surface.'
  date: '2026-04-11T20:13:53.180540Z'
