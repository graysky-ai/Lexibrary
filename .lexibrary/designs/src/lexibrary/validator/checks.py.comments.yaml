comments:
- body: Replaced local _WIKILINK_RE and _HTML_COMMENT_RE regex definitions with imports
    from lexibrary.wiki.patterns. All six _WIKILINK_RE.findall() call sites and three
    _HTML_COMMENT_RE.sub() call sites remain unchanged via import aliases. This is
    a pure refactor with no behavioral change - the validator continues using raw
    .findall() results rather than the higher-level extract_wikilinks() function because
    it needs per-match processing (strip/lowercase) and in some cases all matches
    including duplicates.
  date: '2026-04-07T22:14:19.709865Z'
- body: check_duplicate_slugs now enforces uniqueness within a single artifact type
    (concepts, conventions, or playbooks) rather than globally across all types. Slugs
    only need to be unique within their type because filesystem uniqueness is provided
    by ID prefixes, wikilinks resolve by title (not slug), and per-type indexes (ConceptIndex,
    PlaybookIndex, etc.) form separate namespaces. The collision key changed from
    slug to (artifact_type, slug). Error messages now identify the artifact type (e.g.
    'concept files') for clarity.
  date: '2026-04-11T08:17:13.322315Z'
