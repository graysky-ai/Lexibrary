comments:
- body: 'symbol-graph-5 group 5: DesignFileRequest gains an optional symbol_context:
    SymbolGraphPromptContext field (default None). Group 5 stores it on the request
    so the pipeline can pass pre-rendered enum/call-path blocks to the archivist without
    wiring changes to the BAML call site. Group 8 reads this field in generate_design_file()
    and threads it into the BAML call''s symbol_enums/symbol_call_paths arguments.'
  date: '2026-04-11T23:30:49.626760Z'
- body: 'Group 8 of symbol-graph-5: wired the optional SymbolGraphPromptContext on
    DesignFileRequest through to the BAML call. generate_design_file() now reads request.symbol_context.enums_block
    and request.symbol_context.call_paths_block (defaulting to None when symbol_context
    is None) and forwards them as symbol_enums and symbol_call_paths to ArchivistGenerateDesignFile,
    which corresponds to the new optional BAML prompt sections rendered by symbol_graph_context.render_symbol_graph_context.'
  date: '2026-04-11T23:38:05.501396Z'
