comments:
- body: "Group 9 hooks the symbol-graph refresh_file into update_file: immediately\
    \ after the design file is atomically written and the parent .aindex is refreshed,\
    \ we call lexibrary.symbolgraph.builder.refresh_file(project_root, config, source_path).\
    \ The call is wrapped in its own try/except so a symbol-graph failure can never\
    \ fail the design update \u2014 the symbol graph is a secondary artifact and a\
    \ stale graph is preferred to a failed design update. The deferred import pattern\
    \ matches the rest of this module (noqa: PLC0415). This wiring gives agents per-file\
    \ incremental symbol-graph refresh as part of the existing edit-then-design-update\
    \ workflow; full rebuilds remain the maintainer's responsibility via lexictl update."
  date: '2026-04-11T01:44:17.214142Z'
