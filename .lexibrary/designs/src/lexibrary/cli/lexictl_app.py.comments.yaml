- body: Added --reindex flag to the update() command with mutual exclusivity enforcement.
    The flag follows the existing early-exit pattern (like --topology and --skeleton)
    but is checked last in the guard chain so earlier, more specific guards (like
    skeleton+path) still fire first. The skeleton guard was also updated to reject
    --skeleton --reindex combinations.
