comments:
- body: "New module added by curator-fix Phase 4 (group 9, lexibrary-sq5.9). Hosts\
    \ three residual IWH dispatch handlers \u2014 consume_superseded_iwh, write_reactive_iwh,\
    \ flag_unresolvable_agent_design \u2014 that previously had no wired implementation.\
    \ All three follow the (item: TriageItem, ctx: DispatchContext) -> SubAgentResult\
    \ signature shared by other extracted dispatchers (groups 3, 5, 7, 8), call into\
    \ lexibrary.iwh.reader.consume_iwh / lexibrary.iwh.writer.write_iwh, and report\
    \ outcome=fixed on success or outcome=errored on OSError (recorded in ctx.summary).\
    \ They never modify design files and never call LLMs (llm_calls=0). Their function_ref\
    \ values in RISK_TAXONOMY were re-pointed at this module so the taxonomy self-check\
    \ (test_taxonomy_function_refs_resolve) can resolve them via importlib."
  date: '2026-04-11T01:03:55.673164Z'
