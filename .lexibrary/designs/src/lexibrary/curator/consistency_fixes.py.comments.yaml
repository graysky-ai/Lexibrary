    \ the convention body; human review decides whether to rewrite scope or deprecate.\
    \ The tasks.md naming mismatch comment block above CONSISTENCY_ACTION_KEYS (documenting\
    \ the fix_broken_wikilink_exact / flag_conflicting_conventions stubs) was also\
    \ removed now that those entries no longer exist in the risk taxonomy."
