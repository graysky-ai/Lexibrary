comments:
- body: New module implementing curator Phase 2 lifecycle state machine. Validates
    transitions per artifact type (design_file, concept, convention, playbook, stack_post)
    using VALID_TRANSITIONS dict, enforces terminal states (design_file deprecated
    is terminal), gates hard deletion on TTL + zero-reference checks via link graph,
    and delegates actual mutations to existing lifecycle/ packages. InvalidTransitionError
    is a new LexibraryError subclass.
