- body: 'curator-fix-2 group 3 (CUR-05): consistency_collect docstring updated to
    reflect the new scope/full split. ''promotable blocked IWH'' detection moved from
    the ''full'' bucket to the ''scope'' bucket so the default run surfaces blocked
    IWH promotion candidates without requiring a library-wide sweep. ''full'' now
    only adds domain-term detection and orphan concept detection on top of the scope-level
    checks.'
