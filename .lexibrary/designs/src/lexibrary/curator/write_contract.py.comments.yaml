comments:
- body: New module created by Phase 3a (bead lexibrary-sq5.7) to centralise the design-file
    write contract that was duplicated across staleness.py, reconciliation.py, and
    comments.py. The helper write_design_file_as_curator stamps updated_by='curator',
    recomputes source_hash/interface_hash via compute_hashes, delegates to serialize_design_file
    (which populates design_hash from the rendered body), and writes atomically. Caller
    hands the helper a fully-built DesignFile with placeholder hash values; the helper
    mutates metadata in place before serializing, so callers see final hashes in the
    in-memory object after the call returns. Group 8 (consistency fixes) will also
    call this helper from every consistency fix helper so wikilink repairs, slug collision
    resolution, and similar rewrites inherit the same authorship and hash-freshness
    guarantees.
  date: '2026-04-10T21:37:37.844633Z'
