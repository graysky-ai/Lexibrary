comments:
- body: 'curator-fix Phase 1: added SubAgentResult.outcome Literal and CuratorReport
    schema_version/stubbed/dispatched_details/deferred_details fields. The outcome
    field drives honest fixed/stubbed counters downstream; do not remove or rename
    the existing success/message/path/action_key/llm_calls fields. schema_version=2
    signals the enriched JSON payload for curate_render backward compatibility.'
  date: '2026-04-10T20:51:10.360779Z'
- body: 'curator-fix Phase 5 (group 10): CuratorReport gained an optional verification:
    dict[str, int] | None field. Populated only when CuratorConfig.verify_after_sweep
    is True. Shape: {''before'': int, ''after'': int, ''delta'': int} where delta
    = before - after (positive means issues were resolved). Default None keeps existing
    serialization unchanged so the ''verification'' JSON key is strictly additive.'
  date: '2026-04-11T01:17:12.460325Z'
