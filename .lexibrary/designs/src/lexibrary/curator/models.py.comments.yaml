comments:
- body: "Added per-item layer: Literal['hash','graph'] | None field to CollectItem,\
    \ TriageItem, and SubAgentResult, and bumped CuratorReport.schema_version from\
    \ 2 to 3. Rationale: the upcoming two-pass collect flow (curator-two-pass-collect\
    \ spec) needs to tag each collect/triage/dispatch record with which pass (hash-layer\
    \ or graph-layer) produced it so the report can distinguish, e.g., a staleness\
    \ item fixed in pass 1 from a bidirectional_deps item fixed in pass 2. The field\
    \ defaults to None to preserve legacy single-pass behaviour \u2014 callers on\
    \ the legacy path leave it unset; the two-pass emission sites (task 5.2) will\
    \ set 'hash' or 'graph' explicitly. Aggregate results (CollectResult, DispatchResult)\
    \ deliberately do NOT carry a layer field because the distinction is per-item,\
    \ not per-aggregate. Schema v3 is additive: existing v2 consumers continue to\
    \ render correctly because the renderer dispatches on '>= 2'."
  date: '2026-04-14T05:06:41.077485Z'
