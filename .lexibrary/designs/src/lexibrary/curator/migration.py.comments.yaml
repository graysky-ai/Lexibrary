comments:
- body: 'New module implementing migration execution for curator Phase 2 deprecation
    workflow. Three main functions: validate_successor_chain() verifies superseded_by
    targets are active and cycle-free, apply_migration_edits() applies MigrationEdit
    objects from the BAML sub-agent to dependent artifacts (design files via serialize_design_file
    + atomic_write, concepts/conventions via text replacement + atomic_write), and
    verify_migration() re-checks reverse_deps after migration. Design file edits set
    updated_by to ''curator''. Single-edit failure isolation ensures one bad edit
    does not abort the remaining batch.'
  date: '2026-04-09T07:25:08.120415Z'
