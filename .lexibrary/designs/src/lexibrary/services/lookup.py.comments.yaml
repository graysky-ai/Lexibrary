comments:
- body: "Added KeySymbolSummary dataclass and _build_key_symbols helper wired into\
    \ build_file_lookup. Contract: when config.symbols.enabled is True and .lexibrary/symbols.db\
    \ exists, we open a SymbolQueryService exactly once per file lookup, call symbols_in_file()\
    \ to list every symbol in source order, then call SymbolGraph.symbol_call_counts()\
    \ ONCE (no N+1 via callers_of/callees_of) to get the (caller, callee) count mapping\
    \ keyed by symbol id. We filter to public top-level functions/classes plus every\
    \ method (so the render layer can group methods under their parent class), cap\
    \ at 10 entries, and stash the pre-cap count in key_symbols_total so the renderer\
    \ can emit the '\u2026 and N more' overflow marker. When symbols.db is missing\
    \ or symbols.enabled is False, key_symbols is [] and a DEBUG log is emitted. The\
    \ disabled branch short-circuits BEFORE constructing SymbolQueryService to honour\
    \ spec scenario 'no SymbolQueryService SHALL be opened'."
  date: '2026-04-11T05:23:46.701337Z'
- body: 'symbol-graph-3 Group 6: Added ClassHierarchyEntry dataclass plus a classes
    list field on LookupResult, populated via the new _build_class_hierarchy() helper.
    The helper opens SymbolQueryService, filters symbols_in_file to classes, and for
    each class queries class_edges_from (resolved bases), class_edges_unresolved_from
    (e.g., BaseModel), and class_edges_to (subclass count). Method counts use qualified_name
    prefix matching (<class.qualified_name>.<method.name>) to stay robust against
    nested classes; a line-range fallback handles classes missing a qualified name.
    The helper degrades gracefully (returns []) when config.symbols.enabled is False
    or symbols.db is missing, matching the _build_key_symbols contract.'
  date: '2026-04-11T17:21:07.284975Z'
- body: 'build_file_lookup now opens a single SymbolQueryService instance (owned by
    both symbols.db and index.db) for the entire invocation. Previously three separate
    opens occurred: (1) open_index() for link-graph queries, (2) SymbolQueryService
    inside _build_key_symbols, and (3) SymbolQueryService inside _build_class_hierarchy.
    Under parallel-agent contention these three index.db sqlite3.connect() calls could
    produce transient SQLITE_CANTOPEN warnings. The fix introduces _symbols_section_eligible()
    as a shared gate, _build_key_symbols_with_service() and _build_class_hierarchy_with_service()
    that accept an already-open service, and reuses service._link_graph for the inbound-imports/concepts
    block. When symbols are ineligible (disabled or DB missing), the link graph is
    still opened via the standalone open_index() fallback so link-graph data remains
    available.'
  date: '2026-04-11T19:26:56.125059Z'
- body: 'symbol-graph-5 Group 7: LookupResult gained enum_notes (list[EnumNote]) and
    call_path_notes (list[CallPathNote]) fields populated from the parsed design file.
    The existing parse_design_file call in build_file_lookup was hoisted to the top
    of the function so the enrichment population and the wikilink fallback branch
    share a single parse.'
  date: '2026-04-11T23:43:20.107244Z'
