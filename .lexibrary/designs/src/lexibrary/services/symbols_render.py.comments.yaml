comments:
- body: "Phase 2 (symbol-graph-2) render helpers for lexi trace. render_trace() is\
    \ intentionally void (writes to stdout via info()) because a single trace result\
    \ spans multiple blocks \u2014 a header line, a backticked file:line line, and\
    \ one markdown_table per populated edge category (callers, callees, unresolved_callees).\
    \ Empty categories are omitted entirely so a leaf symbol renders only its header.\
    \ Callers must already have handled staleness warnings (via warn() on stderr)\
    \ before invoking render_trace \u2014 staleness is a service-layer concern, not\
    \ a render one. Phase 3 will extend this with class edges (inherits/instantiates/composes);\
    \ Phase 4 will add enum/constant members. Both extensions plug in as additional\
    \ ### sections under the same output contract."
  date: '2026-04-11T05:13:11.369911Z'
- body: "symbol-graph-3 group 5: render_trace now emits three extra blocks after the\
    \ call sections \u2014 '### Base classes' (parents table), '### Subclasses and\
    \ instantiation sites' (children table with edge_type column), and a trailing\
    \ 'Unresolved bases: ...' line for unresolved_parents. Each block is omitted when\
    \ its data is empty, preserving the existing public contract for non-class symbols."
  date: '2026-04-11T11:15:22.527786Z'
- body: 'symbol-graph-4 group 6.4 adds a trailing ### Members block after the unresolved_parents
    line. Renders a Name | Value | Ordinal Markdown table via the existing markdown_table
    helper. Value column is blank when the member value is None (e.g. Python auto()
    enum members); Ordinal column is blank when ordinal is None. The section is omitted
    entirely when TraceResult.members is empty so non-enum, non-constant traces are
    unaffected.'
  date: '2026-04-11T20:14:01.744707Z'
