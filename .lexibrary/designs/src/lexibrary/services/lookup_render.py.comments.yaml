comments:
- body: "Added render_key_symbols() which formats KeySymbolSummary lists into a '###\
    \ Key symbols' markdown table via cli/_output.markdown_table. Methods render as\
    \ the last two dotted segments of qualified_name ('Class.method') so readers can\
    \ see the owning class without scrolling up; functions and classes render as their\
    \ bare name. Counts render as 'callers \u2192 callees' using a U+2192 arrow. When\
    \ key_symbols_total exceeds the rendered row count, a trailing '\u2026 and N more'\
    \ overflow marker is appended. Returns '' on empty input so the CLI can omit the\
    \ section entirely."
  date: '2026-04-11T05:24:00.215747Z'
